openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: asr
    description: Speech recognition operations
  - name: chat
    description: Chat completion operations
  - name: conversations
    description: Conversation history operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /asr/transcribe:
    post:
      operationId: transcribeAudio
      tags: [asr]
      summary: Transcribe audio to text using Qwen ASR
      description: |
        Accepts base64-encoded audio and returns a transcription from the
        Qwen ASR model (qwen3-asr-flash). The API key is configured on the
        server and is never exposed to the client.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AudioTranscriptionInput"
      responses:
        "200":
          description: Transcription result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AudioTranscriptionResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Transcription failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /chat:
    post:
      operationId: chatCompletions
      tags: [chat]
      summary: Chat completions
      description: |
        Proxies a chat request to the selected AI provider (DeepSeek, Qwen, or Kimi).
        API keys are configured on the server and are never exposed to the client.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionInput"
      responses:
        "200":
          description: Chat completion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Chat completion failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationList"
    post:
      operationId: createConversation
      tags: [conversations]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationWithMessages"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Get conversation with all messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateConversation
      tags: [conversations]
      summary: Update conversation title or pinned state
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConversationInput"
      responses:
        "200":
          description: Updated conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationSummary"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteConversation
      tags: [conversations]
      summary: Delete a conversation and all its messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /conversations/{id}/messages:
    post:
      operationId: addMessages
      tags: [conversations]
      summary: Append messages to a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMessagesInput"
      responses:
        "201":
          description: Messages added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddMessagesResult"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AudioTranscriptionInput:
      type: object
      required:
        - audio
      properties:
        audio:
          type: string
          description: Base64-encoded audio data (without the data URL prefix)
        format:
          type: string
          description: Audio format, e.g. webm, wav, mp3, m4a
        hotwords:
          type: string
          description: Comma-separated hotwords to improve recognition
    AudioTranscriptionResult:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: Transcribed text
        raw:
          type: object
          description: Raw ASR provider response
    ChatCompletionInput:
      type: object
      required:
        - model
        - messages
      properties:
        model:
          type: string
          description: Selected model ID (e.g. deepseek-v4-flash, qwen3.7-plus, kimi-k2.7-code, kimi-k2.7-code-highspeed)
          enum:
            - deepseek-v4-flash
            - qwen3.7-plus
            - kimi-k2.7-code
            - kimi-k2.7-code-highspeed
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        thinking:
          type: boolean
          description: Enable deep thinking / reasoning mode. Kimi models always use deep thinking.
          default: false
        temperature:
          type: number
          description: Sampling temperature. Only applied if the model supports it; ignored otherwise.
          minimum: 0
          maximum: 2
        topP:
          type: number
          description: Top-p nucleus sampling. Only applied if the model supports it; ignored otherwise.
          minimum: 0
          maximum: 1
    ChatMessage:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
    ChatCompletionResult:
      type: object
      required:
        - text
      properties:
        text:
          type: string
        model:
          type: string
        thinking:
          type: boolean
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        details:
          type: string
    ConversationSummary:
      type: object
      required:
        - id
        - title
        - modelId
        - pinned
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        title:
          type: string
        modelId:
          type: string
        pinned:
          type: boolean
        createdAt:
          type: number
        updatedAt:
          type: number
    ConversationList:
      type: object
      required:
        - conversations
      properties:
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/ConversationSummary"
    StoredMessage:
      type: object
      required:
        - id
        - conversationId
        - role
        - text
        - thinking
        - createdAt
      properties:
        id:
          type: string
        conversationId:
          type: string
        role:
          type: string
        text:
          type: string
        thinking:
          type: boolean
        multiAnswer:
          description: Multi-answer versions JSON
        multiAnswerActiveIdx:
          type: number
        createdAt:
          type: number
    ConversationWithMessages:
      type: object
      required:
        - id
        - title
        - modelId
        - pinned
        - createdAt
        - updatedAt
        - messages
      properties:
        id:
          type: string
        title:
          type: string
        modelId:
          type: string
        pinned:
          type: boolean
        createdAt:
          type: number
        updatedAt:
          type: number
        messages:
          type: array
          items:
            $ref: "#/components/schemas/StoredMessage"
    CreateConversationInput:
      type: object
      required:
        - id
        - title
        - modelId
        - pinned
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        title:
          type: string
        modelId:
          type: string
        pinned:
          type: boolean
        createdAt:
          type: number
        updatedAt:
          type: number
    UpdateConversationInput:
      type: object
      properties:
        title:
          type: string
        pinned:
          type: boolean
        modelId:
          type: string
        updatedAt:
          type: number
    DeleteResult:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
    AddMessagesInput:
      type: object
      required:
        - messages
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/NewMessage"
    NewMessage:
      type: object
      required:
        - id
        - role
        - text
        - createdAt
      properties:
        id:
          type: string
        role:
          type: string
        text:
          type: string
        thinking:
          type: boolean
        multiAnswer:
          description: Multi-answer versions JSON
        multiAnswerActiveIdx:
          type: number
        createdAt:
          type: number
    AddMessagesResult:
      type: object
      required:
        - count
      properties:
        count:
          type: number
